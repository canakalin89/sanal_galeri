<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanal Galeri</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ANA SAYFA: Sergi listesi -->
  <div id="view-home">
    <header>
      <p class="school-name">Aziz Sancar Anadolu Lisesi</p>
      <h1>Sanal Galeri</h1>
    </header>
    <div class="exhibitions" id="exhibitions"></div>
  </div>

  <!-- GALERİ SAYFASI: Seçilen sergi -->
  <div id="view-gallery" class="hidden">
    <div class="gallery-header">
      <button id="btn-back" aria-label="Geri">&#8592;</button>
      <div class="gallery-header-text">
        <h2 id="gallery-title"></h2>
        <p id="gallery-desc" class="gallery-desc hidden"></p>
      </div>
    </div>
    <main class="masonry-grid" id="gallery"></main>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Eser görüntüleyici">
    <div class="lb-overlay" id="lb-overlay"></div>
    <button class="lb-close" id="lb-close" aria-label="Kapat">&#x2715;</button>
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="Önceki">&#8249;</button>
    <button class="lb-nav lb-next" id="lb-next" aria-label="Sonraki">&#8250;</button>
    <img class="lb-img" id="lb-img" src="" alt="" />
    <div class="lb-caption" id="lb-caption" aria-live="polite"></div>
  </div>

  <!-- Radyo Widget -->
  <div class="radio-widget" id="radio-widget">
    <div class="radio-header">
      <span class="radio-icon" aria-hidden="true">&#9834;</span>
      <span class="radio-title">Galeri Müziği</span>
      <button class="radio-toggle" id="radio-toggle" aria-label="Müziği gizle">&#9660;</button>
    </div>
    <div class="radio-body" id="radio-body">
      <iframe
        src="https://www.wqxr.org/widgets/embeddable_player/?stream=wqxr#showPlaylist=false"
        frameborder="0"
        class="radio-iframe"
        title="WQXR Klasik Müzik Radyosu"
        allow="autoplay"
      ></iframe>
    </div>
  </div>

  <footer class="site-footer">
    <a href="https://www.instagram.com/can_akalin" target="_blank" rel="noopener noreferrer" class="footer-link">
      <span class="footer-label">Tasarım &amp; Geliştirme</span>
      <span class="footer-name">Can Akalin</span>
    </a>
  </footer>

  <script src="images-list.js"></script>
  <script>
    if (typeof SCHOOL_NAME !== 'undefined') {
      document.querySelector('.school-name').textContent = SCHOOL_NAME;
    }
  </script>
  <script src="script.js"></script>
  <script>
    (function () {
      var body   = document.getElementById('radio-body');
      var toggle = document.getElementById('radio-toggle');
      var open   = localStorage.getItem('radio-open') !== 'false';
      if (!open) { body.style.display = 'none'; toggle.innerHTML = '&#9650;'; }
      toggle.addEventListener('click', function () {
        if (body.style.display === 'none') {
          body.style.display = '';
          toggle.innerHTML = '&#9660;';
          toggle.setAttribute('aria-label', 'Müziği gizle');
          localStorage.setItem('radio-open', 'true');
        } else {
          body.style.display = 'none';
          toggle.innerHTML = '&#9650;';
          toggle.setAttribute('aria-label', 'Müziği göster');
          localStorage.setItem('radio-open', 'false');
        }
      });
    })();
  </script>
</body>
</html>
