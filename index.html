<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanal Galeri</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ANA SAYFA: Sergi listesi -->
  <div id="view-home">
    <header>
      <p class="school-name">Aziz Sancar Anadolu Lisesi</p>
      <h1>Sanal Galeri</h1>
    </header>
    <div class="exhibitions" id="exhibitions"></div>
  </div>

  <!-- GALERİ SAYFASI: Seçilen sergi -->
  <div id="view-gallery" class="hidden">
    <div class="gallery-header">
      <button id="btn-back" aria-label="Geri">&#8592;</button>
      <div class="gallery-header-text">
        <h2 id="gallery-title"></h2>
        <p id="gallery-desc" class="gallery-desc hidden"></p>
      </div>
    </div>
    <main class="masonry-grid" id="gallery"></main>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Eser görüntüleyici">
    <div class="lb-overlay" id="lb-overlay"></div>
    <button class="lb-close" id="lb-close" aria-label="Kapat">&#x2715;</button>
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="Önceki">&#8249;</button>
    <button class="lb-nav lb-next" id="lb-next" aria-label="Sonraki">&#8250;</button>
    <img class="lb-img" id="lb-img" src="" alt="" />
    <div class="lb-caption" id="lb-caption" aria-live="polite"></div>
  </div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <!-- Gizli YouTube Player (display:none kullanılmaz — API çalışmaz) -->
  <div id="yt-player-container" aria-hidden="true" style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;">
    <div id="yt-player"></div>
  </div>

  <!-- Müzik Widget -->
  <div class="music-widget" id="music-widget" role="region" aria-label="Arkaplan müzik oynatıcı">
    <div class="mw-header">
      <span class="mw-icon" aria-hidden="true">&#9834;</span>
      <span class="mw-title">Galeri Müziği</span>
      <button class="mw-toggle" id="mw-toggle" aria-label="Müziği gizle">&#9660;</button>
    </div>
    <div class="mw-body" id="mw-body">
      <div class="mw-track" id="mw-track" aria-live="polite">—</div>
      <div class="mw-controls">
        <button class="mw-btn" id="mw-prev" aria-label="Önceki parça">&#9198;</button>
        <button class="mw-btn mw-play-btn" id="mw-play" aria-label="Oynat">&#9654;</button>
        <button class="mw-btn" id="mw-next" aria-label="Sonraki parça">&#9197;</button>
        <button class="mw-btn" id="mw-mute" aria-label="Sesi kapat">&#128266;</button>
        <input class="mw-volume" id="mw-volume" type="range" min="0" max="100" value="50" aria-label="Ses seviyesi" />
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <a href="https://www.instagram.com/can_akalin" target="_blank" rel="noopener noreferrer" class="footer-link">
      <span class="footer-label">Tasarım &amp; Geliştirme</span>
      <span class="footer-name">Can Akalin</span>
    </a>
  </footer>

  <script src="images-list.js"></script>
  <script>
    if (typeof SCHOOL_NAME !== 'undefined') {
      document.querySelector('.school-name').textContent = SCHOOL_NAME;
    }
  </script>
  <script src="script.js"></script>
  <script src="music-player.js"></script>
</body>
</html>
